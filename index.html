<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Mario Rivas — Resume</title>
    <!--
      data-trunk tells trunk "process this asset during build".
      rel="css" = bundle + hash this stylesheet into the output.
      trunk also auto-injects the WASM <script> into <body>, so we
      leave <body> empty — Leptos fills it in at runtime.
    -->
    <link data-trunk rel="css" href="style/main.css" />
  </head>
  <body></body>
</html>

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:   # lets you trigger it manually from the Actions tab

# Permissions the deploy job needs to publish to Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deploy at a time; newer push cancels an in-flight one.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust + wasm target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      # Cache cargo deps so builds after the first are fast.
      - uses: Swatinem/rust-cache@v2

      - name: Install trunk
        uses: jetli/trunk-action@v0.5.0
        with:
          version: latest

      # --public-url must match the repo name for project Pages:
      #   https://<user>.github.io/ResumePracticeSite/
      - name: Build (release)
        run: |
          trunk build --release --public-url /ResumePracticeSite/
          touch dist/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
